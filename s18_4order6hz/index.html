<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S18 GT vs FootMR</title>
<style>
:root{--paper:#fff;--bg:#f3f1ec;--ink:#101010;--muted:#66615a;--hair:#dedad2;--red:#d62728;--gray:#9ca3af}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);color:var(--ink);font-family:DejaVu Sans,Arial,Helvetica,sans-serif}main{width:min(100%,1120px);margin:0 auto;padding:44px 24px 72px}.cover{min-height:24vh;display:flex;flex-direction:column;justify-content:end;padding:24px 0 34px;border-bottom:1px solid var(--hair);margin-bottom:34px}h1{margin:0;text-align:center;font-size:clamp(36px,5.5vw,72px);line-height:.96;letter-spacing:-.055em}.legend{display:flex;gap:18px;justify-content:center;align-items:center;margin-top:18px;flex-wrap:wrap;color:var(--muted);font-size:14px}.swatch{display:inline-block;width:34px;height:0;border-top:4px solid;margin-right:8px;vertical-align:middle}.gt{border-color:#111}.before{border-color:var(--gray)}.after{border-color:var(--red)}.section-kicker{margin:64px 0 18px;padding-top:22px;border-top:1px solid var(--hair);color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-size:11px;text-align:center}.figure-block{margin:0 0 44px;padding:18px;background:var(--paper);border:1px solid var(--hair);border-radius:22px;box-shadow:0 28px 70px rgba(30,24,18,.08)}.figure-block img{display:block;width:100%;height:auto;border-radius:12px;background:#fff}@media(max-width:760px){main{padding:28px 14px 52px}.figure-block{padding:10px;border-radius:16px;margin-bottom:28px}}@media print{body{background:#fff}.cover{min-height:auto}.figure-block{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<main>
<section class="cover">
<h1>S18 GT vs FootMR</h1>
<div class="legend"><span><i class="swatch gt"></i>GT</span><span><i class="swatch before"></i>before</span><span><i class="swatch after"></i>after</span></div>
</section>
<div class='section-kicker'>S18_CurvWalkClock_1</div>
<figure class='figure-block'><img src='before_after_plots/S18_CurvWalkClock_1_joint_before_after_filter.png' alt='S18_CurvWalkClock_1: joint angles, GT vs before/after FootMR' loading='lazy'></figure>
<figure class='figure-block'><img src='before_after_plots/S18_CurvWalkClock_1_com_before_after_filter.png' alt='S18_CurvWalkClock_1: COM position/velocity/acceleration, GT vs before/after FootMR' loading='lazy'></figure>
<div class='section-kicker'>S18_CurvWalkCounter_1</div>
<figure class='figure-block'><img src='before_after_plots/S18_CurvWalkCounter_1_joint_before_after_filter.png' alt='S18_CurvWalkCounter_1: joint angles, GT vs before/after FootMR' loading='lazy'></figure>
<figure class='figure-block'><img src='before_after_plots/S18_CurvWalkCounter_1_com_before_after_filter.png' alt='S18_CurvWalkCounter_1: COM position/velocity/acceleration, GT vs before/after FootMR' loading='lazy'></figure>
<div class='section-kicker'>S18_Walk_1</div>
<figure class='figure-block'><img src='before_after_plots/S18_Walk_1_joint_before_after_filter.png' alt='S18_Walk_1: joint angles, GT vs before/after FootMR' loading='lazy'></figure>
<figure class='figure-block'><img src='before_after_plots/S18_Walk_1_com_before_after_filter.png' alt='S18_Walk_1: COM position/velocity/acceleration, GT vs before/after FootMR' loading='lazy'></figure>
</main>
</body>
</html>
